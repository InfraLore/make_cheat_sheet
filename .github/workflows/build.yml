name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq texlive-xetex texlive-latex-recommended texlive-fonts-recommended texlive-latex-extra pandoc

      - name: Install fonts
        run: |
          sudo apt-get install -y -qq fonts-dejavu-core fonts-lato
          python3 scripts/install-fonts.py

      - name: Check prerequisites
        run: make check-prereqs

      - name: Lint
        run: |
          pip install -q pymarkdownlnt
          make lint

      - name: Build
        run: make build

      - name: Upload PDF
        uses: actions/upload-artifact@v4
        with:
          name: make-cheatsheet
          path: build/make-cheatsheet.pdf

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download PDF
        uses: actions/download-artifact@v4
        with:
          name: make-cheatsheet

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: make-cheatsheet.pdf
          generate_release_notes: true
